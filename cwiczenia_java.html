<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrian Wojtasik - Portfolio</title>

<style>
:root {
    --bg-dark: #0a0a1a;
    --accent-blue: #4a90e2;
    --neon-green: #39ff14;
    --text-light: #e0e0ff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #1a1a3a 0%, #0a0a1a 100%);
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    margin-top: 50px;
}

h1 {
    font-size: 3.5rem;
    margin: 0;
    background: linear-gradient(to right, var(--accent-blue), var(--neon-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: var(--neon-green);
    margin-top: 8px;
}

/* BIO */
.bio {
    max-width: 700px;
    margin-top: 25px;
    padding: 25px;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--accent-blue);
    border-radius: 12px;
    line-height: 1.6;
}

/* BUTTONS */
.buttons {
    margin-top: 35px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.btn {
    padding: 14px 24px;
    border-radius: 40px;
    border: 1px solid var(--accent-blue);
    background: rgba(74,144,226,0.1);
    color: var(--text-light);
    cursor: pointer;
    transition: 0.3s;
    font-size: 0.95rem;
}

.btn:hover {
    background: var(--accent-blue);
    box-shadow: 0 0 20px var(--accent-blue);
    transform: translateY(-3px);
}

/* PDF VIEWER */
.viewer {
    width: 90%;
    max-width: 1100px;
    height: 80vh;
    margin-top: 30px;
    border: 2px solid var(--accent-blue);
    border-radius: 12px;
    display: none;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
    <h1>Adrian Wojtasik</h1>
    <div class="subtitle">Informatyka i Psychologia</div>
</header>

<div class="bio">
    Specjalizuję się w projektowaniu systemów łączących technologię i ludzkie poznanie.
    Pracuję nad AI, edukacją i uczeniem incydentalnym.
</div>

<div class="buttons">
    <button class="btn" onclick="openPDF('beyond')">
        Beyond Focal Attention
    </button>

    <button class="btn" onclick="openPDF('cognitive')">
        Cognitive Language Engineering
    </button>
</div>

<iframe id="viewer" class="viewer"></iframe>

<script>
const pdfs = {
    beyond: "https://raw.githubusercontent.com/FabianAdrianW/htmlstudia/main/Beyond_Focal_Attention.pdf",
    cognitive: "https://raw.githubusercontent.com/FabianAdrianW/htmlstudia/main/Cognitive_Language_Engineering.pdf"
};

function openPDF(key) {
    const viewer = document.getElementById("viewer");
    const fileUrl = pdfs[key];

    // PDF.js viewer (KLUCZ - brak pobierania)
    const viewerUrl =
        "https://mozilla.github.io/pdf.js/web/viewer.html?file=" +
        encodeURIComponent(fileUrl);

    // toggle
    if (viewer.dataset.current === key) {
        viewer.src = "";
        viewer.style.display = "none";
        viewer.dataset.current = "";
        return;
    }

    viewer.src = viewerUrl;
    viewer.style.display = "block";
    viewer.dataset.current = key;

    viewer.scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
